name: DIY-F401-Build-Final
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install ARM Compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi binutils-arm-none-eabi make

      - name: Make Firmware for F401
        run: |
          # Dùng target MATEKF411 vì nó là "khung" chuẩn nhất cho F401/F411
          make TARGET=MATEKF411
          
      - name: Upload Hex File
        uses: actions/upload-artifact@v4
        with:
          name: Betaflight-F401RC-DIY
          path: obj/*.hex
          
